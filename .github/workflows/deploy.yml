# ============================================================================
# Automatically tests, builds, and deploys to PandaStack on every push to main.
# ============================================================================

name: Deploy to PandaStack

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================================
  # Test job: linting and unit tests
  # ============================================================================
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint
        continue-on-error: true  # Don't block deployment on lint warnings

      - name: Run tests
        run: npm test
        continue-on-error: true  # Allow deployment while tests are being set up

  # ============================================================================
  # Deploy job: only runs on push to main (not PRs)
  # ============================================================================
  deploy:
    name: Deploy to PandaStack
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to PandaStack
        run: npx @pandastack/cli deploy --prod
        env:
          PANDASTACK_TOKEN: ${{ secrets.PANDASTACK_TOKEN }}
          # PandaStack will inject DATABASE_URL and JWT_SECRET automatically
