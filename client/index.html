<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#09090b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="koshi — Terminal-native decentralized SNS" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>" />
  <title>koshi</title>
  <style>
    body{margin:0;background:#09090b}
    #loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#09090b;z-index:9999}
    #loading .spinner{width:28px;height:28px;border:2.5px solid #27272a;border-top-color:#22c55e;border-radius:50%;animation:spin .7s linear infinite}
    #loading .text{margin-top:14px;font-family:monospace;font-size:13px;color:#22c55e;letter-spacing:1px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">
      <div class="spinner"></div>
      <div class="text">koshi<span style="animation:blink 1s step-end infinite">_</span></div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
  <style>@keyframes blink{50%{opacity:0}}</style>
</body>
</html>
