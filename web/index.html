<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌊 koshi — 分散SNS</title>
  <meta name="description" content="ターミナルネイティブな分散SNS" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- ===== Loading Screen ===== -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-spinner">
      <div class="spinner-ring"></div>
      <div class="spinner-ring spinner-ring-2"></div>
      <div class="spinner-ring spinner-ring-3"></div>
    </div>
    <p class="loading-text">🌊 koshi</p>
    <p class="loading-subtext">読み込み中...</p>
  </div>

  <!-- ===== App Shell ===== -->
  <div id="app" class="app-layout" style="display:none;">
    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-logo">
        <a href="#/" data-nav>🌊 koshi</a>
      </div>
      <ul class="sidebar-nav" id="sidebar-nav">
        <li><a href="#/" data-nav>🏠 タイムライン</a></li>
        <li id="nav-search"><a href="#/search" data-nav>🔍 ユーザー検索</a></li>
        <li id="nav-dms"><a href="#/dms" data-nav>💬 DM <span id="dm-badge" class="nav-badge" style="display:none;">0</span></a></li>
        <li id="nav-profile"><a href="#/profile" data-nav>👤 プロフィール</a></li>
        <li id="nav-settings"><a href="#/settings" data-nav>⚙️ 設定</a></li>
      </ul>
      <div class="sidebar-footer" id="sidebar-footer">
        <div class="sidebar-user" id="sidebar-user" style="display:none;">
          <div class="sidebar-user-info">
            <span class="sidebar-username" id="sidebar-username"></span>
            <span class="sidebar-online-dot"></span>
          </div>
          <div class="sidebar-user-actions">
            <button id="btn-logout" class="btn-logout">ログアウト</button>
          </div>
        </div>
        <div class="terminal-hint">
          <p>💻 ターミナル版もどうぞ</p>
          <code>npm i -g @ryopc/koshi</code>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
      <!-- Dynamic content rendered here -->
    </main>
  </div>

  <!-- ===== Toast Container ===== -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ===== Scripts ===== -->
  <script type="module" src="app.js"></script>
</body>
</html>
