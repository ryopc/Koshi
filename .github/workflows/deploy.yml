# License: MIT
# ============================================================================
# Automatically tests on every push, then triggers a deploy to Render.com
# via Render Deploy Hook when pushing to main.
#
# Prerequisites:
#   1. Connect your GitHub repo to Render.com
#   2. Create a Deploy Hook in Render dashboard:
#      https://dashboard.render.com → your service → Settings → Deploy Hook
#   3. Add the Deploy Hook URL as a GitHub secret: RENDER_DEPLOY_HOOK_URL
# ============================================================================

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================================
  # Test job: linting and unit tests
  # ============================================================================
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint
        continue-on-error: true  # Don't block deployment on lint warnings

      - name: Run tests
        run: npm test
        continue-on-error: true  # Allow deployment while tests are being set up

  # ============================================================================
  # Deploy job: trigger Render.com deploy via Deploy Hook
  # Only runs on push to main (not PRs)
  # ============================================================================
  deploy:
    name: Deploy to Render.com
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render.com deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
        shell: bash
