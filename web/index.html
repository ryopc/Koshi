<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>koshi — 分散SNS</title>
  <meta name="description" content="ターミナルネイティブな分散SNS" />
  <meta name="theme-color" content="#f5f5f7" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Loading -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-wave">
      <span>🌊</span>
    </div>
    <p class="loading-text">koshi</p>
  </div>

  <!-- App -->
  <div id="app" class="app" style="display:none;">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <a href="#/" class="logo" data-nav>🌊 koshi</a>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <a href="#/" class="nav-item" data-nav data-nav-page="feed">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          タイムライン
        </a>
        <a href="#/search" class="nav-item" data-nav data-nav-page="search" style="display:none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          ユーザー検索
        </a>
        <a href="#/dms" class="nav-item" data-nav data-nav-page="dms" style="display:none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          DM
          <span class="badge" id="dm-badge" style="display:none;">0</span>
        </a>
        <a href="#/profile" class="nav-item" data-nav data-nav-page="profile" style="display:none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          プロフィール
        </a>
        <a href="#/settings" class="nav-item" data-nav data-nav-page="settings" style="display:none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          設定
        </a>
      </nav>
      <div class="sidebar-foot">
        <div class="sidebar-user" id="sidebar-user" style="display:none;">
          <div class="sidebar-user-row">
            <span class="sidebar-username" id="sidebar-username"></span>
            <span class="online-dot"></span>
          </div>
          <button id="btn-logout" class="btn-logout">ログアウト</button>
        </div>
        <div class="sidebar-hint">
          <span>💻 ターミナル版もどうぞ</span>
          <code>npm i -g @ryopc/koshi</code>
        </div>
      </div>
    </aside>
    <main class="main" id="main-content"></main>
  </div>

  <div id="toast-container" class="toasts"></div>
  <script type="module" src="app.js"></script>
</body>
</html>
